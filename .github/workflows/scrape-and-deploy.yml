name: Scrape and Deploy
on:
  schedule:
    - cron: "0 7,19 * * *" # twice daily
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "public/data/**"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # SSH deploy key with write access. actions/checkout uses it for
          # the initial fetch and persists it for the subsequent `git push`,
          # so the scheduled job can commit refreshed data even though main
          # is protected. The key must be added to the repo (Settings →
          # Deploy keys → Allow write access) and is registered as a bypass
          # actor on the "Protect main" ruleset.
          ssh-key: ${{ secrets.SCRAPE_DEPLOY_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node scripts/scrape.mjs

      - name: Commit updated data
        run: |
          if [ -n "$(git status --porcelain public/data/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/
            git commit -m "chore(data): refresh schedule [skip ci]"
            git push
          else
            echo "No data changes to commit."
          fi

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Next.js
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
